services:
  - type: web
    name: bus-tracking-system
    runtime: php
    repo: https://github.com/YOUR_GITHUB_USERNAME/bus-tracking-system
    plan: free
    region: oregon
    buildCommand: composer install --no-dev --optimize-autoloader
    healthCheckPath: /api/get_buses.php
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        value: mysql-371a3625-alfredndagijimana8-07e1.i.aivencloud.com
      - key: DB_PORT
        value: "23730"
      - key: DB_NAME
        value: defaultdb
      - key: DB_USER
        value: avnadmin
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_CA
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
